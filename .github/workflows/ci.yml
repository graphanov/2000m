name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Build workspace
        run: cargo build --workspace --quiet

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --quiet

      - name: Score the stub driver (harness self-check)
        run: |
          cargo run --quiet -p m2000-conformance -- stub-driver --json-out result.json
          cat result.json

      - name: Assert the suite discriminates (stub passes a low, non-trivial count)
        run: |
          python3 - <<'PY'
          import json
          d = json.load(open("result.json"))
          assert d["determinism"]["pass"] is True, "determinism must hold"
          pc = d["passCount"]
          # The stub intentionally implements only the basics. If it ever passes
          # everything, the suite has stopped discriminating; if it passes nothing,
          # the harness is broken. Lock the expected band.
          assert 1 <= pc <= 5, f"stub passCount {pc} outside expected discrimination band 1..5"
          print(f"OK: determinism pass, stub scored {pc}/{d['totalAcs']}")
          PY

      - name: Validate v2 calibration result spine
        run: |
          tmpdir="$(mktemp -d)"
          for name in good weak-ranked missing-output private-path wrong-stop; do
            cargo run --quiet -p m2000-v2-conformance -- \
              v2/examples/workflow-resilience-pilot.scenario.json \
              v2/examples/pilot-${name}-run-record.json \
              --json-out "$tmpdir/pilot-${name}-result.json"
            diff -u \
              "v2/examples/results/pilot-${name}-result.json" \
              "$tmpdir/pilot-${name}-result.json"
          done
          python3 - <<'PY'
          import json
          expected = {
              'good': (True, 80.0),
              'weak-ranked': (True, 72.0),
              'wrong-stop': (True, 65.0),
              'missing-output': (False, 65.0),
              'private-path': (False, 50.0),
          }
          for name, (ranked, composite) in expected.items():
              d = json.load(open(f'v2/examples/results/pilot-{name}-result.json'))
              assert d['ranked'] is ranked, (name, d['ranked'])
              assert d['compositeScore'] == composite, (name, d['compositeScore'])
          print('OK: all v2 pilot result fixtures match scorer output and expected rank/composite')
          PY
          python3 scripts/render_results.py --check

      - name: Validate v2 paired campaign protocol
        run: python3 scripts/validate_v2_campaigns.py
