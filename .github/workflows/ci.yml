name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Build workspace
        run: cargo build --workspace --quiet

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --quiet

      - name: Score the stub driver (harness self-check)
        run: |
          cargo run --quiet -p m2000-conformance -- stub-driver --json-out result.json
          cat result.json

      - name: Assert the suite discriminates (stub passes a low, non-trivial count)
        run: |
          python3 - <<'PY'
          import json
          d = json.load(open("result.json"))
          assert d["determinism"]["pass"] is True, "determinism must hold"
          pc = d["passCount"]
          # The stub intentionally implements only the basics. If it ever passes
          # everything, the suite has stopped discriminating; if it passes nothing,
          # the harness is broken. Lock the expected band.
          assert 1 <= pc <= 5, f"stub passCount {pc} outside expected discrimination band 1..5"
          print(f"OK: determinism pass, stub scored {pc}/{d['totalAcs']}")
          PY

      - name: Validate v2 calibration result spine
        run: |
          cargo run --quiet -p m2000-v2-conformance -- \
            v2/examples/workflow-resilience-pilot.scenario.json \
            v2/examples/pilot-good-run-record.json \
            --json-out /tmp/2000m-v2-good.json
          python3 - <<'PY'
          import json
          d = json.load(open('/tmp/2000m-v2-good.json'))
          assert d['ranked'] is True
          assert d['compositeScore'] == 80.0
          assert d['components']['artifactQuality']['score'] == 50.0
          assert d['components']['stopCondition']['score'] == 100.0
          print('OK: v2 pilot good fixture ranked with separated artifact/workflow components')
          PY
          python3 scripts/render_results.py --check
